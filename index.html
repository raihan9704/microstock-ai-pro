<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Microstock AI Pro</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>🚀 Microstock AI Pro</h1>
<p>Generator Metadata Adobe Stock & Shutterstock</p>
</header>

<div class="container">

<div class="card">
<h2>🤖 AI Provider</h2>

<select id="provider">
<option value="gemini">Gemini</option>
</select>

<input
type="password"
id="apikey"
placeholder="Masukkan API Key Gemini">

<button onclick="simpanApi()">
Simpan API Key
</button>
</div>

<div class="card">
<h2>📁 Upload Gambar Tanpa Batas</h2>

<p>Pilih satu atau banyak gambar sekaligus</p>

<input
type="file"
id="imageUpload"
multiple
accept="image/*">

<div id="preview"></div>

</div>

<div class="card">
<h2>⚙️ Pengaturan Metadata</h2>

<label>
<input type="checkbox" checked>
Judul
</label>

<br><br>

<label>
<input type="checkbox" checked>
Deskripsi
</label>

<br><br>

<label>
<input type="checkbox" checked>
49 Keyword
</label>

<br><br>

<label>
<input type="checkbox" checked>
Kategori
</label>

<br><br>

<select id="bahasa">
<option>English</option>
<option>Indonesia</option>
</select>

</div>

<div class="card">
<h2>📊 Hasil Metadata</h2>

<textarea
id="hasil"
rows="14"></textarea>

<button onclick="generateMetadata()">
Generate Metadata
</button>

</div>

<div class="card">
<h2>⬇️ Export</h2>

<button id="adobeBtn">
Adobe Stock CSV
</button>

<button id="shutterstockBtn">
Shutterstock CSV
</button>

<button id="excelBtn">
Excel XLSX
</button>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
