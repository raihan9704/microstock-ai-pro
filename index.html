<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Microstock AI Pro</title>

<style>
body{
background:#08152f;
color:white;
font-family:Arial;
padding:20px;
}

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.card{
background:#182744;
padding:20px;
border-radius:15px;
}

input,select,textarea,button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
}

button{
background:#2563eb;
color:white;
cursor:pointer;
}

textarea{
height:350px;
}
</style>
</head>
<body>

<h1>🚀 Microstock AI Pro</h1>

<div class="container">

<div class="card">
<h2>AI Provider</h2>

<select id="provider">
<option value="gemini">Gemini</option>
<option value="openai">OpenAI</option>
<option value="groq">Groq</option>
</select>

<input
type="password"
id="apikey"
placeholder="Masukkan API Key">

<button onclick="simpanApi()">
Simpan API Key
</button>

<h2>Upload Gambar Tanpa Batas</h2>

<input
type="file"
id="imageUpload"
multiple
accept="image/*">

<button onclick="generateMetadata()">
Generate Metadata
</button>

</div>

<div class="card">

<h2>Hasil Metadata</h2>

<textarea id="hasil"></textarea>

</div>

</div>

<script>

function simpanApi(){

const key=
document.getElementById("apikey").value;

localStorage.setItem(
"api_key",
key
);

alert("API Key tersimpan");

}

window.onload=()=>{

const key=
localStorage.getItem("api_key");

if(key){
document.getElementById("apikey").value=key;
}

};

function fileToBase64(file){

return new Promise((resolve,reject)=>{

const reader=new FileReader();

reader.onload=()=>{

resolve(
reader.result.split(",")[1]
);

};

reader.onerror=reject;

reader.readAsDataURL(file);

});

}

async function generateMetadata(){

const provider=
document.getElementById("provider").value;

const apiKey=
document.getElementById("apikey").value;

const files=
document.getElementById("imageUpload").files;

const hasil=
document.getElementById("hasil");

hasil.value="";

if(files.length===0){

alert("Upload gambar dahulu");

return;

}

for(let i=0;i<files.length;i++){

const file=files[i];

hasil.value+=
"Memproses "+file.name+"\n\n";

try{

if(provider==="gemini"){

const base64=
await fileToBase64(file);

const response=
await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
contents:[
{
parts:[
{
text:`
Generate:
Title
Description
49 Keywords
Adobe Stock Category

English.
`
},
{
inline_data:{
mime_type:file.type,
data:base64
}
}
]
}
]
})
}
);

const data=
await response.json();

const text=
data?.candidates?.[0]
?.content?.parts?.[0]
?.text;

hasil.value+=
(text || JSON.stringify(data))
+"\n\n================\n\n";

}

else if(provider==="openai"){

hasil.value+=
"OpenAI Vision siap ditambahkan\n\n";

}

else if(provider==="groq"){

hasil.value+=
"Groq Vision siap ditambahkan\n\n";

}

}catch(err){

hasil.value+=
"ERROR : "
+err.message+
"\n\n";

}

}

}

</script>

</body>
</html>
